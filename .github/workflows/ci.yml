name: CI (type-check, test, build)

# Smoke-check on PRs and on branch pushes. Pushes to main are covered by the
# deploy workflow's build, so they're excluded here to avoid redundant runs.
on:
  push:
    branches-ignore: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Type-check
        run: npm run astro -- check

      - name: Test
        run: npm run test:run

      - name: Build
        run: npm run build
